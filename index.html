<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="styles.css">

  <title>Newsletter sign-up form with success message</title>
</head>
<body>
  <div class="container">
    <div class="right">
      <div class="content">
        <h1>Stay updated!</h1>
        <p>Join 60,000+ product managers receiving monthly updates on:</p>
        <ul class="features">
         <li>
           <img src="images/icon-list.svg" alt="tick-image">
           Product discovery and building what matters
         </li>
         <li>
           <img src="images/icon-list.svg" alt="tick-image">
           Measuring to ensure updates are a success
         </li>
         <li>
           <img src="images/icon-list.svg" alt="tick-image">And much more!
         </li>
        </ul>

        <form action="">
        <label for="email" id="email">Email</label>
        <input type="text" name="email" id="email-input" placeholder="email@company.com">
        <button>Subscribe to monthly newsletter</button>
        </form>
      </div>
    </div>

    <div>
      <img src="images/illustration-sign-up-mobile.svg" alt="">
    </div>
     
  </div>


</body>
</html>
